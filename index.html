<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ultra Monitor - Cascada & Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; transition: all 0.3s; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .diagnostic-card { border-left: 4px solid #ef4444; background: #161b22; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-300 p-6">

    <div class="flex justify-between items-center border-b border-gray-800 pb-5 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">📟 Sistema de Monitoreo Crítico</h1>
            <p class="text-xs text-gray-500 mt-1">Escaneo en cascada: Fortinet > iLO / Virtual</p>
        </div>
        <div class="flex gap-4">
            <input type="text" id="search" placeholder="🔍 Buscar sitio..." class="bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-64">
            <button onclick="startMonitor()" id="btnAction" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-lg">▶ INICIAR ESCANEO</button>
        </div>
    </div>

    <div class="flex gap-10 mb-8 border-b border-gray-800 text-sm">
        <button onclick="switchTab('all')" id="tab-all" class="pb-3 px-2 tab-active transition-all">TODOS (<span id="count-all">0</span>)</button>
        <button onclick="switchTab('online')" id="tab-online" class="pb-3 px-2 text-gray-500 hover:text-gray-300 transition-all">EN LÍNEA (<span id="count-online">0</span>)</button>
        <button onclick="switchTab('offline')" id="tab-offline" class="pb-3 px-2 text-gray-500 hover:text-gray-300 transition-all font-bold text-red-500">CRÍTICOS/CAÍDOS (<span id="count-offline">0</span>)</button>
    </div>

    <div id="view-all" class="tab-content">
        <div id="map-all" class="status-grid"></div>
    </div>

    <div id="view-online" class="tab-content hidden">
        <div id="map-online" class="status-grid"></div>
    </div>

    <div id="view-offline" class="tab-content hidden">
        <div id="map-offline" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let sites = [];
        let isRunning = false;
        let currentTab = 'all';

        async function loadData() {
            const localData = localStorage.getItem('monitor_sites_v3');
            if (localData) {
                sites = JSON.parse(localData);
            } else {
                try {
                    const response = await fetch('data.json'); // Se carga desde el archivo proporcionado 
                    sites = await response.json();
                    saveToLocal();
                } catch(e) { sites = []; }
            }
            updateCounters();
            renderAll();
        }

        function saveToLocal() { localStorage.setItem('monitor_sites_v3', JSON.stringify(sites)); }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active', 'text-gray-300'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            renderAll();
        }

        async function startMonitor() {
            if(isRunning) return location.reload();
            isRunning = true;
            document.getElementById('btnAction').innerText = "🛑 REINICIAR";
            document.getElementById('btnAction').classList.replace('bg-blue-600', 'bg-red-600');
            
            while(isRunning) {
                const batchSize = 20;
                for (let i = 0; i < sites.length; i += batchSize) {
                    const batch = sites.slice(i, i + batchSize);
                    await Promise.all(batch.map((site, index) => cascadedCheck(site, i + index)));
                }
                updateCounters();
                renderAll();
                await new Promise(r => setTimeout(r, 25000));
            }
        }

        // LÓGICA DE CASCADA MEJORADA
        async function cascadedCheck(site, index) {
            // Paso 1: Validar Fortinet (.1)
            const fortiOk = await ping(site.f);
            
            if (!fortiOk) {
                sites[index].status = 'offline';
                sites[index].diag = 'forti_down'; // Todo el complejo incomunicado
                return;
            }

            // Paso 2: Si Forti está OK, validar Servidor Principal (.20/.30)
            const serverOk = await ping(site.ip);
            if (serverOk) {
                sites[index].status = 'online';
                sites[index].diag = 'ok';
                return;
            }

            // Paso 3: Servidor caído pero Forti OK -> Validar iLO y Virtual (Ping Extendido)
            sites[index].status = 'offline';
            const base = site.ip.split('.').slice(0,3).join('.');
            const [iloOk, virtualOk] = await Promise.all([
                ping(`${base}.21`),
                ping(`${base}.22`)
            ]);

            sites[index].v_ip = `${base}.22`;
            sites[index].i_ip = `${base}.21`;
            sites[index].ilo_status = iloOk;
            sites[index].v_status = virtualOk;
            sites[index].diag = (iloOk || virtualOk) ? 'partial' : 'server_dead';
        }

        async function ping(ip) {
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 2000);
                await fetch(`http://${ip}`, { mode: 'no-cors', signal: controller.signal });
                clearTimeout(id);
                return true;
            } catch (e) { return false; }
        }

        function renderAll() {
            const searchTerm = document.getElementById('search').value.toUpperCase();
            const filtered = sites.filter(s => s.n.includes(searchTerm) || s.ip.includes(searchTerm));

            // Render Vista General
            document.getElementById('map-all').innerHTML = filtered.map((s, i) => `
                <div class="bg-gray-900/50 p-2 rounded border border-gray-800 flex justify-between items-center text-[10px]">
                    <div class="flex items-center gap-2 truncate">
                        <span class="dot ${s.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : s.status === 'offline' ? 'bg-red-500 shadow-[0_0_5px_#ef4444]' : 'bg-gray-700'}"></span>
                        <span class="truncate">${s.n}</span>
                    </div>
                </div>
            `).join('');

            // Render Vista Caídos con Diagnóstico
            document.getElementById('map-offline').innerHTML = filtered.filter(s => s.status === 'offline').map((s) => {
                let note = "";
                let buttons = "";

                if (s.diag === 'forti_down') {
                    note = `<div class="bg-red-900/40 p-2 rounded border border-red-500 text-red-200 mt-2">❗ TODO OFFLINE: Solicitar validar enlace con el complejo.</div>`;
                } else if (s.diag === 'partial') {
                    note = `<div class="bg-yellow-900/40 p-2 rounded border border-yellow-500 text-yellow-200 mt-2">💡 SERVIDOR APAGADO: Intentar encendido manual vía iLO o Virtual.</div>`;
                    if (s.v_status) buttons += `<a href="http://${s.v_ip}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-center py-1 rounded text-[10px] font-bold">VIRTUAL (.22)</a>`;
                    if (s.ilo_status) buttons += `<a href="https://${s.i_ip}" target="_blank" class="bg-orange-600 hover:bg-orange-500 text-center py-1 rounded text-[10px] font-bold">iLO (.21)</a>`;
                } else {
                    note = `<div class="bg-gray-800 p-2 rounded border border-gray-600 text-gray-400 mt-2">❌ SIN RESPUESTA: Servidor e iLO no responden. Posible falla de hardware.</div>`;
                }

                return `
                <div class="diagnostic-card p-4 rounded-lg shadow-2xl">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-red-500 text-sm truncate w-2/3">${s.n}</h4>
                        <span class="text-[9px] font-mono text-gray-500">${s.ip}</span>
                    </div>
                    <div class="space-y-1 text-[11px]">
                        <p class="flex justify-between">Fortinet (.1): <span class="${s.diag !== 'forti_down' ? 'text-green-500' : 'text-red-500'} font-bold">${s.diag !== 'forti_down' ? 'ONLINE' : 'OFFLINE'}</span></p>
                    </div>
                    ${note}
                    <div class="grid grid-cols-2 gap-2 mt-4">${buttons}</div>
                </div>`;
            }).join('');

            // Render Online
            document.getElementById('map-online').innerHTML = filtered.filter(s => s.status === 'online').map(s => `
                <div class="bg-green-900/10 border border-green-900/30 p-2 rounded flex items-center gap-2 text-[10px]">
                    <span class="dot bg-green-500 shadow-[0_0_3px_#22c55e]"></span>
                    <span class="text-green-400 truncate">${s.n}</span>
                </div>
            `).join('');
        }

        function updateCounters() {
            document.getElementById('count-all').innerText = sites.length;
            document.getElementById('count-online').innerText = sites.filter(s => s.status === 'online').length;
            document.getElementById('count-offline').innerText = sites.filter(s => s.status === 'offline').length;
        }

        document.getElementById('search').addEventListener('input', renderAll);
        window.onload = loadData;
    </script>
</body>
</html>
