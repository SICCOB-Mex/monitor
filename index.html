<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Crítico - SICCOB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; transition: all 0.3s; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .diagnostic-card { border-left: 4px solid #ef4444; background: #161b22; }
        #timer-display { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-300 p-6">

    <div class="flex justify-between items-center border-b border-gray-800 pb-5 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">📟 Monitor de Infraestructura</h1>
            <p class="text-xs text-gray-500 mt-1">Siguiente validación en: <span id="timer-display" class="text-blue-400 font-bold">01:00</span></p>
        </div>
        <div class="flex gap-4 text-sm">
            <input type="text" id="search" placeholder="🔍 Buscar sitio..." class="bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none w-64">
            <button onclick="startMonitor()" id="btnAction" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition-all shadow-lg">▶ INICIAR</button>
        </div>
    </div>

    <div class="flex gap-10 mb-8 border-b border-gray-800 text-sm">
        <button onclick="switchTab('all')" id="tab-all" class="pb-3 px-2 tab-active transition-all">TODOS (<span id="count-all">0</span>)</button>
        <button onclick="switchTab('online')" id="tab-online" class="pb-3 px-2 text-gray-500 hover:text-gray-300 transition-all text-green-500">ONLINE (<span id="count-online">0</span>)</button>
        <button onclick="switchTab('offline')" id="tab-offline" class="pb-3 px-2 text-gray-500 hover:text-gray-300 transition-all font-bold text-red-500">CAÍDOS (<span id="count-offline">0</span>)</button>
    </div>

    <div id="view-all" class="tab-content"><div id="map-all" class="status-grid"></div></div>
    <div id="view-online" class="tab-content hidden"><div id="map-online" class="status-grid"></div></div>
    <div id="view-offline" class="tab-content hidden"><div id="map-offline" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div></div>

    <script>
        let sites = [];
        let isRunning = false;
        let currentTab = 'all';
        let countdown = 60;
        let timerId = null;

        // Carga de datos desde la lista proporcionada 
        async function loadData() {
            const localData = localStorage.getItem('monitor_v4_data');
            if (localData) {
                sites = JSON.parse(localData);
            } else {
                try {
                    const response = await fetch('data.json');
                    sites = await response.json();
                    save();
                } catch(e) { sites = []; }
            }
            updateCounters();
            render();
        }

        function save() { localStorage.setItem('monitor_v4_data', JSON.stringify(sites)); }

        async function startMonitor() {
            if(isRunning) return location.reload();
            isRunning = true;
            document.getElementById('btnAction').innerText = "🛑 DETENER";
            document.getElementById('btnAction').classList.replace('bg-blue-600', 'bg-red-600');
            runCycle();
        }

        async function runCycle() {
            if(!isRunning) return;
            
            // Lógica de Escaneo en Cascada por Lotes
            const batchSize = 25;
            for (let i = 0; i < sites.length; i += batchSize) {
                const batch = sites.slice(i, i + batchSize);
                await Promise.all(batch.map((site, index) => checkCascaded(site, i + index)));
            }

            updateCounters();
            render();
            resetTimer();
        }

        async function checkCascaded(site, index) {
            // 1. Validar Fortinet (.1) según lista 
            const fortiOk = await ping(site.f);
            if (!fortiOk) {
                sites[index].status = 'offline';
                sites[index].diag = 'critical';
                return;
            }

            // 2. Validar Servidor Principal (.20/.30) 
            const serverOk = await ping(site.ip);
            if (serverOk) {
                sites[index].status = 'online';
                sites[index].diag = 'ok';
                return;
            }

            // 3. Ping Extendido (iLO .21 y Virtual .22)
            sites[index].status = 'offline';
            const base = site.ip.split('.').slice(0,3).join('.');
            const [ilo, virt] = await Promise.all([ping(`${base}.21`), ping(`${base}.22`)]);
            
            sites[index].ilo_ok = ilo;
            sites[index].virt_ok = virt;
            sites[index].diag = (ilo || virt) ? 'reachable' : 'dead';
        }

        async function ping(ip) {
            try {
                const ctrl = new AbortController();
                const timeout = setTimeout(() => ctrl.abort(), 2000);
                await fetch(`http://${ip}`, { mode: 'no-cors', signal: ctrl.signal });
                return true;
            } catch { return false; }
        }

        function resetTimer() {
            countdown = 60;
            if(timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                countdown--;
                const mins = String(Math.floor(countdown / 60)).padStart(2, '0');
                const secs = String(countdown % 60).padStart(2, '0');
                document.getElementById('timer-display').innerText = `${mins}:${secs}`;
                if(countdown <= 0) runCycle();
            }, 1000);
        }

        function render() {
            const search = document.getElementById('search').value.toUpperCase();
            const filtered = sites.filter(s => s.n.includes(search) || s.ip.includes(search));

            // Render Vista Caídos con Notas de Recordatorio
            document.getElementById('map-offline').innerHTML = filtered.filter(s => s.status === 'offline').map(s => {
                let note = "", buttons = "";
                const base = s.ip.split('.').slice(0,3).join('.');

                if (s.diag === 'critical') {
                    note = `<div class="bg-red-900/40 p-2 rounded border border-red-500/50 text-[10px] text-red-200 mt-2">❗ SOLICITAR VALIDAR CON EL COMPLEJO (Todo Offline)</div>`;
                } else if (s.diag === 'reachable') {
                    note = `<div class="bg-yellow-900/40 p-2 rounded border border-yellow-500/50 text-[10px] text-yellow-200 mt-2">💡 ENCENDER POR MÁQUINA VIRTUAL O ILO</div>`;
                    if(s.virt_ok) buttons += `<a href="http://${base}.22" target="_blank" class="bg-blue-600 text-center py-1 rounded text-white font-bold">VIRTUAL</a>`;
                    if(s.ilo_ok) buttons += `<a href="https://${base}.21" target="_blank" class="bg-orange-600 text-center py-1 rounded text-white font-bold">iLO</a>`;
                }

                return `
                <div class="diagnostic-card p-4 rounded-lg shadow-xl">
                    <div class="flex justify-between font-bold text-red-500 text-xs mb-2"><span>${s.n}</span></div>
                    <p class="text-[10px] text-gray-500">IP: ${s.ip} | Forti: ${s.f}</p>
                    ${note}
                    <div class="grid grid-cols-2 gap-2 mt-3">${buttons}</div>
                </div>`;
            }).join('');

            // Render All & Online
            document.getElementById('map-all').innerHTML = filtered.map(s => `
                <div class="bg-gray-900/50 p-2 rounded border border-gray-800 flex items-center gap-2 text-[10px]">
                    <span class="dot ${s.status === 'online' ? 'bg-green-500' : s.status === 'offline' ? 'bg-red-500' : 'bg-gray-600'}"></span>
                    <span class="truncate">${s.n}</span>
                </div>
            `).join('');

            document.getElementById('map-online').innerHTML = filtered.filter(s => s.status === 'online').map(s => `
                <div class="bg-green-900/10 p-2 rounded border border-green-900/20 flex items-center gap-2 text-[10px]">
                    <span class="dot bg-green-500"></span>
                    <span class="truncate text-green-400 font-bold">${s.n}</span>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active', 'text-gray-300'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            render();
        }

        function updateCounters() {
            document.getElementById('count-all').innerText = sites.length;
            document.getElementById('count-online').innerText = sites.filter(s => s.status === 'online').length;
            document.getElementById('count-offline').innerText = sites.filter(s => s.status === 'offline').length;
        }

        document.getElementById('search').addEventListener('input', render);
        window.onload = loadData;
    </script>
</body>
</html>
