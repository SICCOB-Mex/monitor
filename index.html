<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Masivo - Tabs Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body class="bg-[#0d1117] text-gray-300 p-5">

    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
        <h1 class="text-2xl font-bold text-white flex items-center gap-3">
            📡 Monitor de Red 
            <span id="global-count" class="bg-blue-900 text-blue-300 text-xs px-2 py-1 rounded">0 Sites</span>
        </h1>
        <div class="flex gap-4">
            <input type="text" id="search" placeholder="Buscar sitio o IP..." class="bg-gray-800 border border-gray-700 rounded px-3 py-1 text-sm focus:outline-none focus:border-blue-500">
            <button onclick="startMonitor()" id="btnAction" class="bg-green-600 hover:bg-green-700 text-white px-5 py-1 rounded font-bold text-sm transition-colors">▶ INICIAR ESCANEO</button>
        </div>
    </div>

    <div class="flex gap-8 mb-6 border-b border-gray-800 text-sm">
        <button onclick="switchTab('all')" id="tab-all" class="pb-2 px-1 tab-active transition-all">TODOS (<span id="count-all">0</span>)</button>
        <button onclick="switchTab('online')" id="tab-online" class="pb-2 px-1 text-gray-500 hover:text-gray-300 transition-all">EN LÍNEA (<span id="count-online">0</span>)</button>
        <button onclick="switchTab('offline')" id="tab-offline" class="pb-2 px-1 text-gray-500 hover:text-gray-300 transition-all">CAÍDOS (<span id="count-offline">0</span>)</button>
    </div>

    <div id="view-all" class="tab-content">
        <div id="map-all" class="status-grid bg-gray-900/30 p-4 rounded-lg border border-gray-800"></div>
    </div>

    <div id="view-online" class="tab-content hidden">
        <div id="map-online" class="status-grid bg-green-900/10 p-4 rounded-lg border border-green-900/30"></div>
    </div>

    <div id="view-offline" class="tab-content hidden">
        <div id="map-offline" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </div>

    <script>
        let sites = [];
        let isRunning = false;
        let currentTab = 'all';

        async function loadData() {
            const localData = localStorage.getItem('monitor_sites_v2');
            if (localData) {
                sites = JSON.parse(localData);
            } else {
                try {
                    const response = await fetch('data.json');
                    sites = await response.json();
                    saveToLocal();
                } catch(e) { sites = []; }
            }
            updateCounters();
            renderAll();
        }

        function saveToLocal() { localStorage.setItem('monitor_sites_v2', JSON.stringify(sites)); }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active', 'text-gray-300'));
            
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            renderAll();
        }

        function deleteSite(index) {
            if(confirm(`¿Eliminar ${sites[index].n}?`)) {
                sites.splice(index, 1);
                saveToLocal();
                updateCounters();
                renderAll();
            }
        }

        // Función para testear conectividad rápida (Simulación de Ping)
        async function quickPing(ip, label) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "⏳...";
            btn.disabled = true;

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 3000);
                await fetch(`http://${ip}`, { mode: 'no-cors', signal: controller.signal });
                alert(`✅ ${label} (${ip}) responde.`);
            } catch (e) {
                alert(`❌ ${label} (${ip}) no responde.`);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function renderAll() {
            const searchTerm = document.getElementById('search').value.toUpperCase();
            const filtered = sites.filter(s => s.n.includes(searchTerm) || s.ip.includes(searchTerm));

            // Render Todos
            document.getElementById('map-all').innerHTML = filtered.map((s, i) => `
                <div class="flex justify-between items-center bg-gray-800 p-2 rounded border border-gray-700 text-[10px]">
                    <div class="flex items-center gap-2 truncate">
                        <span id="dot-all-${i}" class="dot ${s.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : s.status === 'offline' ? 'bg-red-500 shadow-[0_0_5px_#ef4444]' : 'bg-gray-600'}"></span>
                        <span class="truncate">${s.n}</span>
                    </div>
                    <button onclick="deleteSite(${i})" class="text-gray-600 hover:text-red-500 font-bold ml-2">✕</button>
                </div>
            `).join('');

            // Render Online
            document.getElementById('map-online').innerHTML = filtered.filter(s => s.status === 'online').map((s) => `
                <div class="flex items-center gap-2 bg-green-900/20 p-2 rounded border border-green-800/30 text-[10px]">
                    <span class="dot bg-green-500 shadow-[0_0_3px_#22c55e]"></span>
                    <span class="truncate text-green-300 font-medium">${s.n}</span>
                </div>
            `).join('');

            // Render Offline (Cards detalladas con botones de Ping)
            document.getElementById('map-offline').innerHTML = filtered.filter(s => s.status === 'offline').map((s) => {
                const base = s.ip.split('.').slice(0,3).join('.');
                return `
                <div class="bg-gray-900 border border-red-500/50 p-4 rounded-lg shadow-lg">
                    <div class="text-red-500 font-bold mb-2 flex justify-between">
                        <span class="truncate">${s.n}</span>
                        <span class="text-[9px] bg-red-900/40 px-2 py-1 rounded">OFFLINE</span>
                    </div>
                    <div class="text-[11px] space-y-2">
                        <p class="text-gray-400">Host: <span class="text-gray-200 font-mono">${s.ip}</span></p>
                        <p class="text-gray-400">Forti: <span class="text-gray-200 font-mono">${s.f}</span></p>
                        
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <a href="http://${base}.22" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-center py-2 rounded font-bold text-white">VIRTUAL</a>
                            <a href="https://${base}.21" target="_blank" class="bg-orange-600 hover:bg-orange-500 text-center py-2 rounded font-bold text-white">iLO</a>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="quickPing('${s.f}', 'Forti')" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-[9px] py-1 rounded text-gray-300 transition-colors">⚡ PING FORTI</button>
                            <button onclick="quickPing('${base}.21', 'iLO')" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-[9px] py-1 rounded text-gray-300 transition-colors">⚡ PING iLO</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function startMonitor() {
            if(isRunning) return location.reload();
            isRunning = true;
            document.getElementById('btnAction').innerText = "🛑 DETENER";
            document.getElementById('btnAction').classList.replace('bg-green-600', 'bg-red-600');
            
            while(isRunning) {
                const batchSize = 25;
                for (let i = 0; i < sites.length; i += batchSize) {
                    const batch = sites.slice(i, i + batchSize);
                    await Promise.all(batch.map((site, index) => checkSite(site, i + index)));
                }
                updateCounters();
                renderAll();
                await new Promise(r => setTimeout(r, 20000));
            }
        }

        async function checkSite(site, index) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);
                await fetch(`http://${site.ip}`, { mode: 'no-cors', signal: controller.signal });
                sites[index].status = 'online';
            } catch (e) {
                sites[index].status = 'offline';
            }
        }

        function updateCounters() {
            const online = sites.filter(s => s.status === 'online').length;
            const offline = sites.filter(s => s.status === 'offline').length;
            document.getElementById('global-count').innerText = `${sites.length} Sites`;
            document.getElementById('count-all').innerText = sites.length;
            document.getElementById('count-online').innerText = online;
            document.getElementById('count-offline').innerText = offline;
        }

        document.getElementById('search').addEventListener('input', renderAll);
        window.onload = loadData;
    </script>
</body>
</html>
